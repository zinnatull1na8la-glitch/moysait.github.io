<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Книга рецептов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <h1>📖 Книга рецептов</h1>
            <button id="openAddModalBtn" class="btn btn-primary">+ Добавить рецепт</button>
        </div>
    </header>

    <main class="container">
        <!-- Панель управления: Поиск, Фильтры, Сортировка -->
        <section class="controls-panel">
            <div class="control-group">
                <input type="text" id="searchInput" placeholder="Поиск по названию..." class="input-field">
            </div>
            
            <div class="control-group">
                <select id="categoryFilter" class="input-field">
                    <option value="all">Все категории</option>
                    <option value="завтрак">Завтрак</option>
                    <option value="обед">Обед</option>
                    <option value="ужин">Ужин</option>
                    <option value="десерт">Десерт</option>
                    <option value="закуска">Закуска</option>
                </select>
            </div>

            <div class="control-group">
                <select id="timeFilter" class="input-field">
                    <option value="all">Любое время</option>
                    <option value="15">До 15 мин</option>
                    <option value="30">До 30 мин</option>
                    <option value="60">До 60 мин</option>
                    <option value="120">До 2 часов</option>
                </select>
            </div>

            <div class="control-group">
                <input type="text" id="ingredientFilter" placeholder="Ингредиенты (через запятую)..." class="input-field" title="Например: мука, яйца">
            </div>

            <div class="control-group">
                <select id="sortSelect" class="input-field">
                    <option value="dateDesc">Сначала новые</option>
                    <option value="dateAsc">Сначала старые</option>
                    <option value="nameAsc">По названию (А-Я)</option>
                    <option value="nameDesc">По названию (Я-А)</option>
                    <option value="timeAsc">По времени (по возрастанию)</option>
                    <option value="timeDesc">По времени (по убыванию)</option>
                </select>
            </div>
            
            <button id="resetFiltersBtn" class="btn btn-secondary">Сбросить</button>
        </section>

        <!-- Сетка рецептов -->
        <section id="recipesGrid" class="recipes-grid">
            <!-- Рецепты будут добавлены сюда через JS -->
        </section>
        
        <p id="noResultsMessage" class="hidden">Рецепты не найдены. Попробуйте изменить параметры поиска.</p>
    </main>

    <!-- Модальное окно: Добавление / Редактирование -->
    <div id="recipeModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modalTitle">Добавить рецепт</h2>
            <form id="recipeForm">
                <input type="hidden" id="recipeId">
                
                <div class="form-group">
                    <label for="title">Название *</label>
                    <input type="text" id="title" required class="input-field">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Категория *</label>
                        <select id="category" required class="input-field">
                            <option value="завтрак">Завтрак</option>
                            <option value="обед">Обед</option>
                            <option value="ужин">Ужин</option>
                            <option value="десерт">Десерт</option>
                            <option value="закуска">Закуска</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="time">Время приготовления (мин) *</label>
                        <input type="number" id="time" min="1" required class="input-field">
                    </div>
                </div>

                <div class="form-group">
                    <label for="image">URL изображения</label>
                    <input type="url" id="image" placeholder="https://example.com/image.jpg" class="input-field">
                </div>

                <div class="form-group">
                    <label for="ingredients">Ингредиенты * (через запятую)</label>
                    <input type="text" id="ingredients" placeholder="мука, яйца, молоко, сахар" required class="input-field">
                </div>

                <div class="form-group">
                    <label for="description">Описание приготовления *</label>
                    <textarea id="description" rows="5" required class="input-field"></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary close-modal-btn">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно: Просмотр деталей -->
    <div id="viewModal" class="modal hidden">
        <div class="modal-content view-modal-content">
            <span class="close-modal">&times;</span>
            <img id="viewImage" src="" alt="Recipe Image" class="view-image" onerror="this.src='https://via.placeholder.com/600x300?text=Нет+изображения'">
            <h2 id="viewTitle"></h2>
            <div class="view-meta">
                <span id="viewCategory" class="badge"></span>
                <span id="viewTime" class="badge time-badge"></span>
            </div>
            <div class="view-section">
                <h3>Ингредиенты:</h3>
                <ul id="viewIngredients"></ul>
            </div>
            <div class="view-section">
                <h3>Приготовление:</h3>
                <p id="viewDescription" class="whitespace-pre"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
